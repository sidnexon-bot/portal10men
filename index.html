<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="theme-color" content="#f2f2f7" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#1c1c1e" media="(prefers-color-scheme: dark)">
  <meta name="theme-color" content="#f2f2f7">
  <title>10base</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="apple-touch-icon" href="icon.png">
  <script src="auth.js"></script>
</head>
<body>
  <!-- SIDEBAR (desktop only) -->
<aside class="sidebar" id="sidebar" style="display:none">
  <div class="sidebar-logo">10base</div>
  <div class="sidebar-subtitle">Powered by 10menogram</div>

  <div class="sidebar-profile">
    <div class="sidebar-profile-avatar" id="sidebarAvatar">?</div>
    <div>
      <div class="sidebar-profile-name" id="sidebarName">—</div>
      <div class="sidebar-profile-role" id="sidebarRole">—</div>
    </div>
  </div>

  <nav class="sidebar-nav">
    <button class="sidebar-nav-item active" id="sidebarDashboard">
      <span class="icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 10.5L12 3l9 7.5V21a1 1 0 0 1-1 1h-5v-6H9v6H4a1 1 0 0 1-1-1z"/></svg>
      </span>
      Přehled
    </button>
    <button class="sidebar-nav-item" id="sidebarEvents">
      <span class="icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
      </span>
      Akce
    </button>
    <button class="sidebar-nav-item" id="sidebarPayments">
      <span class="icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="2" y="6" width="20" height="14" rx="2"/><path d="M2 10h20"/></svg>
      </span>
      Platby
    </button>
    <button class="sidebar-nav-item" id="sidebarEnergy">
      <span class="icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M13 2L4.5 13.5H12L11 22l8.5-11.5H12L13 2z"/></svg>
      </span>
      Energie
    </button>
  </nav>

  <hr class="sidebar-divider">

  <div class="sidebar-bottom">
    <button class="sidebar-action" onclick="toggleDarkMode()">
      <span class="icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </span>
      <span id="sidebarDarkLabel">Tmavý režim</span>
    </button>
    <button class="sidebar-action" onclick="Auth.logout()" style="color:#ff3b30">
      <span class="icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/></svg>
      </span>
      Odhlásit se
    </button>
  </div>
</aside>

 <header>
  <div class="header-inner">
    <div class="header-row">
      <div>
        <h1>10base</h1>
        <div class="subtitle">Powered by 10menogram</div>
      </div>
      <div style="position:relative">
        <div id="profileBtn" class="profile-btn">ZV</div>
        <div id="profileMenu" class="profile-menu hidden">
          <div class="profile-menu-info">
            <div id="profileMenuName" class="profile-menu-name"></div>
            <div id="profileMenuEmail" class="profile-menu-email"></div>
            <div id="profileMenuRole" class="profile-menu-role"></div>
            <div id="profileMenuVoice" class="profile-menu-voice"></div>
          </div>
          <hr class="profile-menu-divider">
          <div id="profileMenuSwitchBtn" class="profile-menu-item hidden">👥 Přepnout člena</div>
          <div class="profile-menu-item" id="darkModeToggle" onclick="toggleDarkMode()">🌙 Tmavý režim</div>
          <div class="profile-menu-item profile-menu-logout" onclick="Auth.logout()">⏏ Odhlásit se</div>
        </div>
      </div>
    </div>
  </div>
</header>

  <main id="main">
    <p class="notice">Načítám…</p>
  </main>

  <nav class="bottom-wrap">
    <div class="bottom">
      <button id="btnDashboard" class="active">
  <span class="icon">
    <svg viewBox="0 0 24 24">
      <path d="M3 10.5L12 3l9 7.5V21a1 1 0 0 1-1 1h-5v-6H9v6H4a1 1 0 0 1-1-1z"/>
    </svg>
  </span>
  <small>Přehled</small>
</button>
      <button id="btnEvents">
  <span class="icon">
    <svg viewBox="0 0 24 24">
      <path d="M6 2v2H5a2 2 0 0 0-2 2v2h18V6a2 2 0 0 0-2-2h-1V2h-2v2H8V2H6zm15 8H3v10a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V10z"/>
    </svg>
  </span>
  <small>Akce</small>
</button>
      <button id="btnPayments">
  <span class="icon">
    <svg viewBox="0 0 24 24">
      <path d="M2 6h20v12H2zM2 10h20"/>
    </svg>
  </span>
  <small>Platby</small>
</button>
      <button id="btnEnergy">
  <span class="icon">
    <svg viewBox="0 0 24 24">
      <path d="M13 2L3 14h7v8l10-12h-7z"/>
    </svg>
  </span>
  <small>Energie</small>
</button>
    </div>
  </nav>

  <!-- MEMBER MODAL -->
  <div id="memberModal" class="modal hidden">
    <div class="modal-backdrop" onclick="closeMemberModal()"></div>
    <div class="modal-content">
      <div class="modal-header">
        <b>Vyber člena</b>
      </div>
      <div id="memberList"></div>
    </div>
  </div>

  <!-- PIN zatím vypnut -->

  <script src="api.js"></script>
  <script src="app.js" defer></script>

</body>
</html>
