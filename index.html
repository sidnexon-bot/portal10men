<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>10men Portal</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <div class="header-inner">
      <div class="header-row">
        <div>
          <h1>10men Portál</h1>
          <div class="subtitle">Powered by 10menogram</div>
        </div>
        <div id="profileBtn" class="profile-btn">ZV</div>
      </div>
    </div>
  </header>

  <main id="main">
    <p class="notice">Načítám…</p>
  </main>

  <nav class="bottom-wrap">
    <div class="bottom">
      <button id="btnDashboard" class="active">
        <span>🏠</span>
        <small>Přehled</small>
      </button>
      <button id="btnEvents">
        <span>📅</span>
        <small>Akce</small>
      </button>
      <button id="btnPayments">
        <span>💳</span>
        <small>Platby</small>
      </button>
      <button id="btnEnergy">
        <span>⚡</span>
        <small>Energie</small>
      </button>
    </div>
  </nav>

  <!-- MEMBER MODAL -->
  <div id="memberModal" class="modal hidden">
    <div class="modal-backdrop" onclick="closeMemberModal()"></div>
    <div class="modal-content">
      <div class="modal-header">
        <b>Vyber člena</b>
      </div>
      <div id="memberList"></div>
    </div>
  </div>

  <!-- PIN MODAL -->
<div id="pinModal" class="modal hidden">
  <div class="modal-backdrop" onclick="closePinModal()"></div>
  <div class="modal-content">
    <div class="modal-header">
      <b>Zadej PIN</b>
    </div>
    <div style="padding:16px">
      <input
        id="pinInput"
        type="password"
        inputmode="numeric"
        pattern="[0-9]*"
        maxlength="4"
        placeholder="••••"
        style="text-align:center;font-size:24px;letter-spacing:8px"
      >
      <div style="display:flex;gap:10px;margin-top:16px">
        <button onclick="closePinModal()" style="flex:1">Zrušit</button>
        <button onclick="submitPin()" style="flex:1;background:#007aff;color:#fff">OK</button>
      </div>
    </div>
  </div>
</div>

  <script src="api.js"></script>
  <script src="app.js" defer></script>

</body>
</html>
