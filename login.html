<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>10base – Přihlášení</title>
  <link rel="stylesheet" href="style.css">
  <!-- Google Identity Services -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body class="login-page">

  <div class="login-card">
    <h1>10base</h1>
    <p>Přihlas se svým Google účtem</p>

    <div id="g_id_onload"
      data-client_id="955473483298-159qj84ebumnrnueu0kjdfjho0nh4q6b.apps.googleusercontent.com"
      data-callback="handleCredentialResponse"
      data-auto_prompt="false">
    </div>
    <div class="g_id_signin"
      data-type="standard"
      data-size="large"
      data-theme="outline"
      data-text="sign_in_with"
      data-locale="cs">
    </div>

    <p id="login-error" class="error hidden"></p>
  </div>

  <script>
    async function handleCredentialResponse(response) {
  const idToken = response.credential;

  const url = new URL('https://script.google.com/macros/s/AKfycbx74L6IrbOJmCdIEF4SxGOoS8aV3rTtVc2XIsGXgfu6OnO27Kh3KGLv4lwzdw6n1Qnzgw/exec');
  url.searchParams.set('action', 'verifyUser');
  url.searchParams.set('idToken', idToken);

  const res = await fetch(url.toString(), { cache: 'no-store' });
  const user = await res.json();

  if (user.success) {
    sessionStorage.setItem('10base_user', JSON.stringify(user));
    sessionStorage.setItem('10base_token', idToken);
    window.location.href = 'index.html';
  } else {
    document.getElementById('login-error').textContent = 'Přístup zamítnut: ' + user.error;
    document.getElementById('login-error').classList.remove('hidden');
  }
}

  </script>

</body>
</html>
