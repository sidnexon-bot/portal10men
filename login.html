<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>10base – Přihlášení</title>
  <link rel="stylesheet" href="style.css">
  <!-- Google Identity Services -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script type="module" src="firebase.js"></script>

</head>
<body class="login-page">

  <div class="login-card">
    <h1>10base</h1>
    <p>Přihlas se svým Google účtem</p>

    <div id="g_id_onload"
      data-client_id="955473483298-159qj84ebumnrnueu0kjdfjho0nh4q6b.apps.googleusercontent.com"
      data-callback="handleCredentialResponse"
      data-auto_prompt="false">
    </div>
    <div class="g_id_signin"
      data-type="standard"
      data-size="large"
      data-theme="outline"
      data-text="sign_in_with"
      data-locale="cs">
    </div>

    <p id="login-error" class="error hidden"></p>
  </div>

  <script type="module">
  import { auth, signInWithPopup, GoogleAuthProvider } from "./firebase.js"
  import { database, ref, get } from "./firebase.js"

  async function handleGoogleLogin(){
    try{
      const provider = new GoogleAuthProvider()
      const result   = await signInWithPopup(auth, provider)
      const user     = result.user
      const email    = user.email

      // ověř uživatele v Firebase databázi
      const snapshot = await get(ref(database, "/members"))
      const members  = snapshot.val()
      const member   = Object.values(members).find(m => m.email === email)

      if(!member){
        document.getElementById("login-error").textContent = "Přístup zamítnut: email není v seznamu členů"
        document.getElementById("login-error").classList.remove("hidden")
        return
      }

      // ulož do localStorage
      localStorage.setItem("10base_user", JSON.stringify({
        email: member.email,
        name:  member.name,
        role:  member.role,
        voice: member.voice,
        success: true
      }))

      window.location.href = "index.html"

    }catch(err){
      document.getElementById("login-error").textContent = "Chyba přihlášení: " + err.message
      document.getElementById("login-error").classList.remove("hidden")
    }
  }

  // nahraď Google tlačítko
  window.addEventListener("load", () => {
    const btn = document.createElement("button")
    btn.textContent = "Přihlásit se přes Google"
    btn.className = "primary-btn"
    btn.style.cssText = "width:100%;padding:14px;font-size:16px;margin-top:16px"
    btn.onclick = handleGoogleLogin
    document.querySelector(".login-card").appendChild(btn)

    // skryj původní Google tlačítko
    const gBtn = document.querySelector(".g_id_signin")
    if(gBtn) gBtn.style.display = "none"
  })
</script>

</body>
</html>
